name: Build unsigned iOS artifact

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-ios-unsigned-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select_run:
    name: Avoid duplicate branch and tag builds
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decision.outputs.should_build }}

    steps:
      - name: Checkout branch push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select build run
        id: decision
        shell: bash
        run: |
          set -euo pipefail

          SHOULD_BUILD=true
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            MATCHING_TAG="$(git tag --points-at "${GITHUB_SHA}" --list 'v*')"
            if [[ -n "${MATCHING_TAG}" ]]; then
              SHOULD_BUILD=false
              echo "跳过已由标签构建覆盖的 main 分支提交：${MATCHING_TAG}"
            fi
          fi

          echo "should_build=${SHOULD_BUILD}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build unsigned iOS IPA
    needs: select_run
    if: needs.select_run.outputs.should_build == 'true'
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail

          XCODE_APP=""
          for candidate in /Applications/Xcode_26.5.app /Applications/Xcode_26.5.0.app /Applications/Xcode.app; do
            if [[ -d "${candidate}" ]]; then
              XCODE_APP="${candidate}"
              break
            fi
          done

          if [[ -z "${XCODE_APP}" ]]; then
            echo "找不到可用的 Xcode"
            exit 1
          fi

          sudo xcode-select -s "${XCODE_APP}/Contents/Developer"
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build unsigned IPA
        run: bash build_ios_unsigned.sh

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v7
        with:
          name: Hanairo-iOS-unsigned-${{ github.run_number }}
          path: build/Hanairo-iOS-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
